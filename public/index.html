<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EntreNous - Bienvenue</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-box {
            background-color: #ffffff;
            border: 1px solid #dbdbdb;
            padding: 30px 40px;
            width: 350px;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        h1 {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            color: #262626;
            margin-bottom: 30px;
            font-size: 32px;
        }
        input {
            width: 100%;
            padding: 9px;
            margin-bottom: 8px;
            background-color: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            box-sizing: border-box;
            font-size: 12px;
        }
        button {
            width: 100%;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 7px 0;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }
        button:hover {
            background-color: #1877f2;
        }
        .divider {
            margin: 20px 0;
            color: #8e8e8e;
            font-size: 12px;
            font-weight: 600;
        }
        .forgot-link {
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
            margin-top: 15px;
            display: inline-block;
        }
        .redirect-box {
            background-color: #ffffff;
            border: 1px solid #dbdbdb;
            padding: 20px;
            width: 350px;
            text-align: center;
            box-sizing: border-box;
            font-size: 14px;
            color: #262626;
        }
        .redirect-box a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }
        #error-message {
            color: #ed4956;
            font-size: 12px;
            margin-top: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- 1ère Proposition : Connexion Directe -->
    <div class="auth-box">
        <h1>EntreNous</h1>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Num. de mobile ou email" required>
            <input type="password" id="password" placeholder="Mot de passe" required>
            <button type="submit">Se connecter</button>
        </form>
        
        <!-- Zone pour afficher les erreurs si le mot de passe est faux -->
        <div id="error-message"></div>
        
        <div class="divider">OU</div>
        
        <a href="/auth/forgot-password.html" class="forgot-link">Mot de passe oublié ?</a>
    </div>

    <!-- 2ème Proposition : Possibilité de s'inscrire -->
    <div class="redirect-box">
        En ordre pour participer ? <a href="/auth/register.html">Inscris-toi</a>
    </div>

    <!-- CORRECTION : Script JavaScript pour gérer la soumission et la redirection -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Empêche le rechargement de la page qui cassait tout
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorElement = document.getElementById('error-message');

            errorElement.innerText = ""; // Nettoyer l'ancienne erreur

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                // Si les identifiants sont bons, Express renvoie la redirection vers home.html
                if (response.redirected) {
                    window.location.href = response.url; 
                } else {
                    const errorText = await response.text();
                    errorElement.innerText = errorText; // Affiche "Email ou mot de passe incorrect"
                }
            } catch (error) {
                errorElement.innerText = "Erreur de connexion au serveur.";
            }
        });
    </script>

</body>
</html>
