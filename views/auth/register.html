<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EntreNous - Inscription</title>
    <!-- Style minimaliste inspiré d'Instagram -->
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-container {
            background-color: #ffffff;
            border: 1px solid #dbdbdb;
            padding: 40px;
            width: 350px;
            text-align: center;
            box-sizing: border-box;
        }
        h2 {
            color: #262626;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 9px;
            margin-bottom: 10px;
            background-color: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            box-sizing: border-box;
            font-size: 12px;
        }
        button {
            width: 100%;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 7px 0;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #1877f2;
        }
        p {
            font-size: 14px;
            color: #8e8e8e;
            margin-top: 20px;
        }
        a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>EntreNous</h2>
        <p>Inscris-toi pour voir les publications de tes amis.</p>
        
        <!-- Attention : l'action pointe exactement vers ta route backend -->
        <form action="/auth/register" method="POST">
            <input type="text" name="fullname" placeholder="Nom complet" required>
            <input type="email" name="email" placeholder="Num. de mobile ou email" required>
            <input type="password" name="password" placeholder="Mot de passe" required>
            <button type="submit">S'inscrire</button>
        </form>
    </div>

</body>
</html>
